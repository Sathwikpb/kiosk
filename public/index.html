<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kiosk</title>
  <script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- SPLASH SCREEN -->
  <div id="splash">
    <img src="cmti-logo.svg" alt="CMTI Logo" id="splash-logo">
    <p id="splash-status">Starting up...</p>
  </div>

  <!-- SLEEP SCREEN -->
  <div id="sleep" class="hidden">
    <img src="cmti-logo.svg" alt="CMTI Logo" id="sleep-logo">
  </div>

  <!-- FILE BROWSER -->
  <div id="browser" class="hidden">
    <div id="topbar">
      <h1>CMTI Kiosk</h1>
      <button id="upload-btn" onclick="window.location='/upload.html'">⬆ Upload</button>
      <button id="refresh-btn" onclick="loadFiles()">↺ Refresh</button>
      <button id="delete-btn" onclick="toggleSelectMode()">🗑</button>
      <button id="confirm-delete-btn" class="hidden danger" onclick="confirmDelete()">Delete (<span id="selected-count">0</span>)</button>
      <button id="cancel-select-btn" class="hidden" onclick="cancelSelectMode()">✕ Cancel</button>
    </div>
    <div id="file-grid"></div>
  </div>

  <!-- SLIDE VIEWER -->
  <div id="slide-viewer" class="hidden">
    <div id="viewer-topbar">
      <button onclick="closeViewer()">✕ Close</button>
      <span id="slide-filename"></span>
      <span id="slide-page-info"></span>
    </div>
    <canvas id="pdf-canvas"></canvas>
    <div id="slide-controls">
      <button id="prev-btn" onclick="changePage(-1)">‹</button>
      <button id="next-btn" onclick="changePage(1)">›</button>
    </div>
  </div>

  <!-- 3D VIEWER -->
  <div id="model-viewer-wrap" class="hidden">
    <div id="viewer-topbar">
      <button onclick="closeViewer()">✕ Close</button>
      <span id="model-filename"></span>
    </div>
    <model-viewer id="mv"
      camera-controls
      touch-action="pan-y"
      auto-rotate
      shadow-intensity="1"
      style="width:100%;height:calc(100vh - 60px);">
    </model-viewer>
  </div>

  <script src="app.js"></script>
</body>
</html>
